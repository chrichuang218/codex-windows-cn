name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # OIDC for Sigstore signing
  attestations: write   # publish the build-provenance attestation

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Frontend dependencies
        run: npm --prefix frontend ci

      - name: Frontend tests
        run: npm --prefix frontend test

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Tauri release build
        run: cargo tauri build --no-bundle

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/codex-launcher.exe dist/codex-launcher.exe
          $hash = (Get-FileHash dist/codex-launcher.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  codex-launcher.exe" | Out-File -FilePath dist/codex-launcher.exe.sha256 -Encoding ASCII -NoNewline
          Write-Host "SHA-256: $hash"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/codex-launcher.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/codex-launcher.exe
            dist/codex-launcher.exe.sha256
          body: |
            # Codex Windows 中文助手

            本发布来自 `chrichuang218/codex-windows-cn`。这是社区开源的中文安装更新助手，不是 OpenAI 官方项目，也不修改、不重新分发 Codex 本体。

            ## 下载

            - `codex-launcher.exe`
            - `codex-launcher.exe.sha256`

            ## 校验

            本 release 由 GitHub Actions 从 tag `${{ github.ref_name }}`（commit `${{ github.sha }}`）构建，并发布 SHA256 文件。

            ```powershell
            (Get-FileHash .\codex-launcher.exe -Algorithm SHA256).Hash
            # 与 codex-launcher.exe.sha256 中的 SHA256 值对比
            ```

            构建来源验证：

            ```
            gh attestation verify codex-launcher.exe --owner chrichuang218
            ```

            校验通过只能证明你拿到的是本仓库对应构建产物，不能表示它是 OpenAI 官方发布物。
