<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Windows 中文助手</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100vh;
        background: #181a17;
      }

      #root {
        color: #f4f1e8;
        font-family: "Microsoft YaHei UI", "Segoe UI", system-ui, sans-serif;
      }

      .preboot-shell {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        padding: 22px 28px 18px;
        background:
          linear-gradient(145deg, rgba(232, 189, 105, 0.025), transparent 42%),
          #181a17;
      }

      .preboot-panel {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        min-height: 0;
      }

      .preboot-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        min-height: 30px;
      }

      .preboot-header h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
      }

      .preboot-header p,
      .preboot-header span,
      .preboot-main p,
      .preboot-main span {
        margin: 0;
        color: #9f9d91;
        font-size: 11px;
      }

      .preboot-header p {
        margin-top: 5px;
      }

      .preboot-header span {
        font-size: 10px;
        font-weight: 700;
      }

      .preboot-divider {
        height: 1px;
        margin-top: 10px;
        background: rgba(233, 231, 218, 0.13);
      }

      .preboot-main {
        display: grid;
        place-items: center;
        align-content: center;
        gap: 12px;
        min-height: 0;
        text-align: center;
      }

      .preboot-main h2 {
        margin: 0;
        font-size: 15px;
      }

      .preboot-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(115, 210, 198, 0.55);
        border-radius: 10px;
        padding: 2px;
        background: rgba(115, 210, 198, 0.08);
        box-shadow: 0 10px 28px rgba(115, 210, 198, 0.14);
      }

      .preboot-mark img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 7px;
        object-fit: cover;
      }

      .preboot-track {
        width: min(360px, 70vw);
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .preboot-track div {
        width: 34%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #d7c87a, #66d1c7);
        animation: preboot-sweep 1.1s ease-in-out infinite;
      }

      .preboot-footer {
        min-height: 34px;
        border-top: 1px solid rgba(233, 231, 218, 0.13);
        padding-top: 10px;
        color: #68675f;
        font-size: 10px;
      }

      @keyframes preboot-sweep {
        0% {
          margin-left: -36%;
        }

        100% {
          margin-left: 102%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="preboot-shell">
        <section class="preboot-panel">
          <header class="preboot-header">
            <div>
              <h1>Codex Windows 中文助手</h1>
              <p>安装向导</p>
            </div>
            <span>正在加载</span>
          </header>
          <div class="preboot-divider"></div>
          <section class="preboot-main">
            <div class="preboot-mark" aria-hidden="true">
              <img alt="" src="/chatgpt-mark.svg" />
            </div>
            <h2>正在启动 Codex Windows 中文助手</h2>
            <div class="preboot-track"><div></div></div>
            <span>准备中</span>
            <p>正在读取安装、版本和更新状态。</p>
          </section>
          <footer class="preboot-footer">官方 Microsoft Store 分发</footer>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
